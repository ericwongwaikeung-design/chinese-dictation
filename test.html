<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>默書系統 v2.3 - 穩定修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --primary-color: #3498db; --success-color: #2ecc71; --bg-color: #fdf6e3; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); text-align: center; padding: 15px; color: #333; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; min-height: 450px; }
        
        .status { color: #888; font-size: 14px; margin-bottom: 10px; padding: 5px; }
        .lang-switch { margin-bottom: 20px; padding: 12px; background: #f0f0f0; border-radius: 10px; display: inline-flex; gap: 15px; align-items: center; }

        /* 字庫表：限定高度並顯示捲軸 */
        #word-bank-container { border: 1px solid #ddd; border-radius: 12px; background: #fafafa; margin-bottom: 20px; display: none; overflow: hidden; }
        .word-bank { 
            display: flex; flex-direction: column; gap: 8px; 
            max-height: 300px; /* 約 5 個項目的高度 */
            overflow-y: auto; padding: 15px; text-align: left;
        }
        
        /* 捲軸美化 */
        .word-bank::-webkit-scrollbar { width: 8px; }
        .word-bank::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .word-btn { 
            background: #fff; border: 2px solid var(--primary-color); color: var(--primary-color); 
            padding: 12px 15px; border-radius: 10px; cursor: pointer; 
            font-size: 18px; font-weight: bold; width: 100%;
            white-space: normal; word-break: break-all; transition: 0.2s;
        }
        .word-btn:hover { background: #ebf5fb; }

        /* 預習區：精準 10 字換行 */
        #preview-area { background: #e8f6f3; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: none; }
        #preview-writer-container { 
            display: flex; flex-wrap: wrap; justify-content: flex-start; 
            gap: 5px; margin: 15px auto; width: 455px; /* (40px + 5px gap) * 10 */
        }
        .char-box { border: 1px solid #ddd; border-radius: 4px; background: white; box-sizing: border-box; }
        
        /* 測驗區 */
        #writer-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        
        button { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: var(--success-color); color: white; width: 100%; font-size: 1.2em; }
        .btn-audio { background: #f39c12; color: white; }
        .btn-action { background: #9b59b6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 靖柔的默書小幫手</h1>
    
    <div class="lang-switch">
        <span>讀音：</span>
        <label><input type="radio" name="voiceLang" value="zh-HK" checked> 廣東話</label>
        <label><input type="radio" name="voiceLang" value="zh-CN"> 普通話</label>
    </div>

    <div id="loading-status" class="status">正在同步試算表資料...</div>
    
    <div id="word-bank-container">
        <div style="padding: 10px; background: #eee; font-weight: bold; border-bottom: 1px solid #ddd;">本期字庫表 (向上滑動查看更多)</div>
        <div id="word-bank" class="word-bank"></div>
    </div>

    <div id="preview-area">
        <h3 style="color: #16a085; margin-top: 0;">🔍 預習模式</h3>
        <button class="btn-audio" onclick="speakPreviewWord()">🔈 讀音</button>
        <button class="btn-action" onclick="animatePreview()">筆順演示</button>
        <div id="preview-writer-container"></div>
        <button onclick="closePreview()" style="background:#bdc3c7; margin-top: 10px;">返回字庫</button>
    </div>
    
    <button class="btn-start" id="start-btn" onclick="startQuiz()" style="display:none;">開始隨機默書</button>

    <div id="quiz-area" style="display:none; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px;">
        <h2 id="quiz-status">聽寫練習</h2>
        <button class="btn-audio" onclick="speakCurrentWord()">🔈 重新播放</button>
        <div id="writer-container"></div>
        <div style="margin-top:15px;">
            <button class="btn-action" onclick="showAllStrokes()">顯示答案</button>
            <button onclick="nextWord()" style="background:var(--primary-color); color:white">下一題</button>
        </div>
    </div>
</div>

<script>
    const PUBLISH_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD4G48qqtl2pimwA3XpNo-HbzG_K04T5Nwzr_kL330-fi2acIJmrAjVgktkQk1YdH92EqJNl8kQjkG/pub?output=csv'; 
    
    let words = [];
    let currentQuizIndex = 0;
    let quizPool = [];
    let quizWriters = [];
    let previewWriters = [];
    let currentPreviewWord = '';

    // 核心修復：使用更安全的解析方式
    async function fetchWords() {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(`${PUBLISH_URL}&t=${Date.now()}`);
            if (!response.ok) throw new Error('網絡連線異常');
            
            const rawData = await response.text();
            if (!rawData || rawData.trim() === "") throw new Error('讀取到空白資料');

            const lines = rawData.split(/\r?\n/);
            words = [];

            // 從第二行開始讀取 (i=1)
            for (let i = 1; i < lines.length; i++) {
                let cell = lines[i].split(',')[0]; // 只取 A 欄
                if (cell) {
                    let cleanWord = cell.trim().replace(/^"|"$/g, ''); // 去除引號
                    if (cleanWord !== "") words.push(cleanWord);
                }
            }
            
            if (words.length > 0) {
                statusEl.innerHTML = `<span style="color:green">✅ 已成功同步 ${words.length} 組內容</span>`;
                renderWordBank();
                document.getElementById('word-bank-container').style.display = 'block';
                document.getElementById('start-btn').style.display = 'block';
            } else {
                statusEl.innerText = '⚠️ 試算表 A 欄似乎沒有字詞。';
            }
        } catch (error) {
            console.error(error);
            statusEl.innerHTML = `<span style="color:red">❌ 同步失敗: ${error.message}</span><br><small>請檢查 Sheets 是否已「發佈為 CSV」</small>`;
        }
    }

    function renderWordBank() {
        const container = document.getElementById('word-bank');
        container.innerHTML = words.map((w, i) => `
            <div class="word-item">
                <button class="word-btn" onclick="openPreview('${w}')">${i + 1}. ${w}</button>
            </div>`).join('');
    }

    function openPreview(word) {
        currentPreviewWord = word;
        document.getElementById('preview-area').style.display = 'block';
        document.getElementById('word-bank-container').style.display = 'none';
        document.getElementById('start-btn').style.display = 'none';
        
        const container = document.getElementById('preview-writer-container');
        container.innerHTML = '';
        previewWriters = [];

        for (let char of word) {
            const charDiv = document.createElement('div');
            charDiv.className = 'char-box';
            container.appendChild(charDiv);
            previewWriters.push(HanziWriter.create(charDiv, char, { 
                width: 40, height: 40, padding: 2, showOutline: true, strokeAnimationSpeed: 2
            }));
        }
        speak(word);
    }

    function closePreview() {
        document.getElementById('preview-area').style.display = 'none';
        document.getElementById('word-bank-container').style.display = 'block';
        document.getElementById('start-btn').style.display = 'block';
    }

    function animatePreview() { previewWriters.forEach(w => w.animateCharacter()); }
    function speakPreviewWord() { speak(currentPreviewWord); }

    function startQuiz() {
        quizPool = [...words].sort(() => Math.random() - 0.5);
        currentQuizIndex = 0;
        document.getElementById('word-bank-container').style.display = 'none';
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQuizWord();
    }

    function showQuizWord() {
        const word = quizPool[currentQuizIndex];
        const container = document.getElementById('writer-container');
        container.innerHTML = '';
        quizWriters = [];
        document.getElementById('quiz-status').innerText = `正在練習第 ${currentQuizIndex + 1} / ${quizPool.length} 題`;
        speak(word);

        for (let char of word) {
            const charDiv = document.createElement('div');
            charDiv.className = 'char-box';
            container.appendChild(charDiv);
            quizWriters.push(HanziWriter.create(charDiv, char, { 
                width: 60, height: 60, padding: 5, showCharacter: false, showOutline: false 
            }));
        }
    }

    function speakCurrentWord() { speak(quizPool[currentQuizIndex]); }
    function showAllStrokes() { quizWriters.forEach(w => { w.showOutline(); w.animateCharacter(); }); }

    function nextWord() {
        currentQuizIndex++;
        if (currentQuizIndex < quizPool.length) {
            showQuizWord();
        } else { 
            alert('全數練習完成！'); 
            location.reload(); // 重置回字庫表
        }
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = document.querySelector('input[name="voiceLang"]:checked').value;
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    fetchWords();
</script>

</body>
</html>
