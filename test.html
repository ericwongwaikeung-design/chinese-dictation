<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自動同步默書系統 v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root { --primary-color: #3498db; --success-color: #2ecc71; --bg-color: #fdf6e3; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); text-align: center; padding: 15px; color: #333; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: auto; min-height: 400px; }
        
        .status { color: #888; font-size: 14px; margin-bottom: 15px; padding: 10px; min-height: 20px; }
        .lang-switch { margin-bottom: 20px; padding: 12px; background: #f0f0f0; border-radius: 10px; display: inline-flex; gap: 15px; align-items: center; }

        /* 1. 字庫表佈局：支援一行多個按鈕，最多10個 */
        .word-bank { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(calc(10% - 10px), 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
            justify-content: center;
        }
        /* 如果字詞太長，讓該按鈕橫跨多欄 */
        .word-item { grid-column: span 1; display: flex; }
        .long-word { grid-column: 1 / -1; } /* 長句子自動佔滿整行 */

        .word-btn { 
            background: #fff; border: 2px solid var(--primary-color); color: var(--primary-color); 
            padding: 10px; border-radius: 10px; cursor: pointer; 
            font-size: 16px; font-weight: bold; width: 100%;
            text-align: center; white-space: normal; word-break: break-all;
            transition: 0.2s;
        }
        .word-btn:hover { background: var(--primary-color); color: white; }

        /* 2. 預習模式：精準 10 字換行 */
        #preview-area { background: #e8f6f3; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: none; }
        #preview-writer-container { 
            display: flex; flex-wrap: wrap; justify-content: flex-start; 
            gap: 5px; margin: 20px auto; 
            width: 455px; /* (40px字體 + 5px間距) * 10 = 450px + 額外 buffer */
        }
        
        .char-box { border: 1px solid #ddd; border-radius: 4px; background: white; flex-shrink: 0; box-sizing: border-box; }
        
        /* 測驗區 */
        #writer-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        
        button { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-start { background: var(--success-color); color: white; width: 100%; font-size: 1.2em; margin-top: 10px; }
        .btn-audio { background: #f39c12; color: white; }
        .btn-action { background: #9b59b6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 自動同步默書練習</h1>
    
    <div class="lang-switch">
        <span>讀音：</span>
        <label><input type="radio" name="voiceLang" value="zh-HK" checked> 廣東話</label>
        <label><input type="radio" name="voiceLang" value="zh-CN"> 普通話</label>
    </div>

    <div id="loading-status" class="status">正在同步試算表資料...</div>
    
    <div id="word-bank-container" style="display: none;">
        <h3 style="color: #2c3e50;">本期字庫表 (點擊字詞預習)</h3>
        <div id="word-bank" class="word-bank"></div>
    </div>

    <div id="preview-area">
        <h3 style="color: #16a085;">🔍 預習模式</h3>
        <button class="btn-audio" onclick="speakPreviewWord()">🔈 讀音</button>
        <button class="btn-action" onclick="animatePreview()">演示筆順</button>
        <div id="preview-writer-container"></div>
        <button onclick="closePreview()" style="background:#bdc3c7;">關閉預習</button>
    </div>
    
    <button class="btn-start" id="start-btn" onclick="startQuiz()" style="display:none;">開始隨機默書</button>

    <div id="quiz-area" style="display:none; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px;">
        <h2 id="quiz-status">聽寫練習</h2>
        <button class="btn-audio" onclick="speakCurrentWord()" style="font-size: 1.2em;">🔈 重新播放題目</button>
        <div id="writer-container"></div>
        <button class="btn-action" onclick="showAllStrokes()">顯示答案</button>
        <button onclick="nextWord()" style="background:var(--primary-color); color:white">下一題</button>
    </div>
</div>

<script>
    const PUBLISH_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD4G48qqtl2pimwA3XpNo-HbzG_K04T5Nwzr_kL330-fi2acIJmrAjVgktkQk1YdH92EqJNl8kQjkG/pub?output=csv'; 
    
    let words = [];
    let currentQuizIndex = 0;
    let quizPool = [];
    let quizWriters = [];
    let previewWriters = [];
    let currentPreviewWord = '';

    async function fetchWords() {
        const statusEl = document.getElementById('loading-status');
        try {
            const response = await fetch(`${PUBLISH_URL}&t=${Date.now()}`);
            if (!response.ok) throw new Error('網路回應不正常');
            
            const data = await response.text();
            // 改進的 CSV 解析邏輯
            const lines = data.split(/\r?\n/);
            words = lines.slice(1) 
                         .map(row => {
                             // 處理可能包含引號的 CSV 格式
                             let firstCol = row.split(',')[0];
                             return firstCol ? firstCol.trim().replace(/^"|"$/g, '') : "";
                         })
                         .filter(w => w.length > 0);
            
            if (words.length > 0) {
                statusEl.innerHTML = `<span style="color:green">✅ 已成功同步 ${words.length} 組內容</span>`;
                renderWordBank();
                document.getElementById('word-bank-container').style.display = 'block';
                document.getElementById('start-btn').style.display = 'block';
            } else {
                statusEl.innerText = '⚠️ 試算表內沒有偵測到字詞，請確認第一欄(A欄)有內容。';
            }
        } catch (error) {
            statusEl.innerHTML = `<span style="color:red">❌ 同步失敗：${error.message}</span><br><small>請確認 Google Sheets 是否已「發佈到網路」並選擇 CSV 格式。</small>`;
        }
    }

        const container
